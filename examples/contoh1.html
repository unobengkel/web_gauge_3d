<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contoh 1 - Penggunaan Dasar 3D Gauge</title>
    
    <!-- 1. Tambahkan Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- 2. Tambahkan CSS Widget Gauge -->
    <link rel="stylesheet" href="../asset/widgetgauge/gauge.css">
    
    <!-- 3. Tambahkan JS Widget Gauge -->
    <script src="../asset/widgetgauge/gauge.js"></script>
    
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            background-color: #f3f4f6; 
            margin:0;
        }
        .gauge-container { 
            width: 300px; 
            height: 250px; 
            position: relative; 
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding-top: 15px;
        }
        .value-display { 
            position: absolute; 
            bottom: 10%; 
            left: 50%; 
            transform: translateX(-50%); 
            font-size: 2rem; 
            font-weight: bold; 
            color: #333;
        }
    </style>
</head>
<body>
    <h2 style="color: #333; margin-bottom: 30px;">Contoh Básico 1: Penggunaan Dasar Widget Gauge</h2>
    
    <!-- 4. Siapkan Container -->
    <div class="gauge-container" id="my-gauge">
        <div class="value-display"><span id="gauge-value">0</span>°C</div>
    </div>

    <!-- 5. Inisialisasi Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Inisialisasi widget
            const gauge = new GaugeWidget('#my-gauge', {
                minValue: 0,
                maxValue: 100,
                initialValue: 0
            });

            // Hubungkan dengan text display
            gauge.bindToDisplay(document.getElementById('gauge-value'));

            // Setel nilai ke 75 setelah delay sedetik
            setTimeout(() => {
                gauge.setValue(75);
            }, 1000);
        });
    </script>
</body>
</html>
